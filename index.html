<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GERD Checker</title>
<link rel="stylesheet" href="style.css">

<!-- Library -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/ml5/0.12.2/ml5.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>
<body>
<div class="app">

  <!-- TOP BAR -->
  <header class="topbar">
    <h1>GERD Checker</h1>
    <p id="welcome">Halo</p>
  </header>

  <!-- CEK MAKANAN -->
  <section id="cek" class="section hidden">
    <div class="card">
      <h2>Cek Makanan</h2>
      <video id="camera" autoplay playsinline class="hidden" style="width:300px;"></video>
      <img id="capturedImage" class="hidden" style="width:200px;height:auto;margin-top:10px;">
      <input id="foodInput" placeholder="Nama makanan atau hasil AI" style="margin-top:10px;width:90%;">
      <div style="margin-top:10px;">
        <button onclick="openCamera()">Buka Kamera</button>
        <button onclick="takePhoto()">Ambil Foto</button>
        <button onclick="cekFood()">Cek Nutrisi</button>
      </div>
      <div id="result" style="margin-top:10px;"></div>
      <canvas id="nutritionChart" style="margin-top:10px;"></canvas>
    </div>
  </section>

  <!-- DATABASE MAKANAN -->
  <section id="makanan" class="section hidden">
    <div class="card">
      <h2>Database Makanan</h2>
      <input id="searchFood" placeholder="Cari makanan" oninput="searchFood()">
    </div>
    <div id="foodListContainer"></div>
  </section>

  <!-- BMI -->
  <section id="bmi" class="section hidden">
    <div class="card">
      <h2>Kalkulator BMI</h2>
      <input id="weight" placeholder="Berat kg">
      <input id="height" placeholder="Tinggi cm">
      <button onclick="hitungBMI()">Hitung BMI</button>
    </div>
    <div id="bmiResult"></div>
  </section>

  <!-- RIWAYAT -->
  <section id="riwayat" class="section hidden">
    <h2>Riwayat</h2>
    <div id="historyList"></div>
  </section>

  <!-- AKUN -->
  <section id="akun" class="section hidden">
    <div class="card">
      <h2>Akun</h2>
      <input id="username" placeholder="Nama pengguna">
      <button onclick="saveUser()">Simpan</button>
    </div>
  </section>

  <!-- NAVBAR -->
  <nav class="navbar">
    <button onclick="showSection('cek')">Cek</button>
    <button onclick="showSection('makanan')">Makanan</button>
    <button onclick="showSection('bmi')">BMI</button>
    <button onclick="showSection('riwayat')">Riwayat</button>
    <button onclick="showSection('akun')">Akun</button>
  </nav>

</div>

<!-- Script utama -->
<script src="script.js"></script>
</body>
</html>
