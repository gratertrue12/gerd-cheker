<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GERD Checker Pro</title>
  <!-- Chart.js & ml5 (CDN aman) -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@3.9.1/dist/chart.min.js"></script>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <div class="topbar">
      <h1>GERD Checker</h1>
      <p id="welcome">Halo, selamat datang!</p>
    </div>

    <!-- Akun -->
    <section id="account" class="section">
      <h2>👤 Akun (Opsional)</h2>
      <input type="text" id="username" placeholder="Nama akun" />
      <button id="saveUserBtn">Simpan Akun</button>
    </section>

    <!-- Makanan -->
    <section id="food" class="section hidden">
      <h2>🍽️ Cek Makanan</h2>
      <input type="text" id="searchFood" placeholder="Cari makanan cepat..." />
      <div id="foodListContainer"></div>
      <input type="text" id="foodInput" placeholder="Contoh: 100 g apel" />
      <button id="cekFoodBtn">🔍 Cek Skor GERD</button>
      <div id="result"></div>
      <canvas id="nutritionChart" width="300" height="200"></canvas>

      <hr />
      <button id="openCameraBtn">📸 Buka Kamera</button>
      <video id="camera" class="hidden" autoplay playsinline muted></video>
      <button id="takePhotoBtn" class="hidden">📷 Ambil Foto</button>
      <button id="closeCameraBtn" class="hidden">❌ Tutup Kamera</button>
      <img id="capturedImage" class="hidden" />
    </section>

    <!-- BMI -->
    <section id="bmi" class="section hidden">
      <h2>⚖️ Kalkulator BMI</h2>
      <input type="number" id="weight" placeholder="Berat (kg)" />
      <input type="number" id="height" placeholder="Tinggi (cm)" />
      <button id="bmiBtn">Hitung BMI</button>
      <div id="bmiResult"></div>
    </section>

    <!-- Riwayat -->
    <section id="riwayat" class="section hidden">
      <h2>📜 Riwayat Pengecekan</h2>
      <div id="historyList"></div>
      <button id="exportCsvBtn">📥 Export CSV</button>
    </section>

    <!-- Navigasi Bawah -->
    <div class="navbar">
      <button data-section="account">👤 Akun</button>
      <button data-section="food">🍲 Makanan</button>
      <button data-section="bmi">⚖️ BMI</button>
      <button data-section="riwayat">📜 Riwayat</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
