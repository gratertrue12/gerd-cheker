<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NutriCheck · Pilihan Sumber Data</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@3.9.1/dist/chart.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', system-ui, -apple-system, sans-serif; }
    body { background: #e8f0fe; display: flex; justify-content: center; padding: 12px; }
    .app { width: 420px; max-width: 100%; background: white; border-radius: 32px 32px 0 0; box-shadow: 0 20px 40px rgba(0,20,30,0.15); overflow: hidden; }
    .topbar { background: #1e3a5f; color: white; padding: 24px 20px; }
    .topbar h1 { font-size: 28px; font-weight: 700; letter-spacing: -0.3px; }
    .topbar p { font-size: 15px; opacity: 0.85; margin-top: 4px; }
    .section { padding: 20px; background: #f9fcff; }
    .hidden { display: none !important; }
    .card { background: white; padding: 18px; border-radius: 24px; box-shadow: 0 6px 16px rgba(0,0,0,0.03); margin-bottom: 18px; border: 1px solid #dee9f2; }
    h2 { font-size: 20px; font-weight: 600; margin-bottom: 16px; color: #0a2540; }
    input, select { width: 100%; padding: 14px 16px; margin: 8px 0; border-radius: 40px; border: 1px solid #cbd6e3; font-size: 16px; background: white; }
    .row { display: flex; gap: 10px; }
    button { width: 100%; padding: 16px; border: none; border-radius: 60px; background: #1e3a5f; color: white; font-size: 17px; font-weight: 600; cursor: pointer; margin: 8px 0; transition: 0.15s; }
    button:hover { background: #143048; }
    .navbar { display: flex; justify-content: space-around; background: white; border-top: 1px solid #d9e2ec; padding: 10px 0 16px; }
    .navbar button { background: transparent; color: #3a5670; font-size: 13px; padding: 8px 0; border-radius: 40px; }
    .food-card { padding: 12px 16px; background: white; margin: 6px 0; border-radius: 40px; border: 1px solid #d3e0ee; cursor: pointer; }
    .food-card:hover { background: #ebf3fa; border-color: #1e3a5f; }
    .metrics-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin: 16px 0; }
    .metric-card { background: #f2f8ff; border-radius: 20px; padding: 12px; text-align: center; }
    .score { font-size: 28px; font-weight: 700; }
    .progress-bar-bg { background: #e2eaf2; height: 24px; border-radius: 40px; overflow: hidden; margin: 10px 0; }
    .progress-fill { height: 100%; color: white; font-size: 13px; text-align: center; line-height: 24px; font-weight: 500; }
    .good { background: #1e8e3e; } .warning { background: #f9a825; } .bad { background: #c53929; }
    .chart-container { height: 200px; margin: 20px 0; }
    .chart-wrapper .chart-container:first-child { margin-bottom: 30px; }
    .recommend-box { background: #e4f0fa; padding: 16px; border-radius: 20px; border-left: 5px solid #1e3a5f; margin-top: 16px; }
    .footer-note { font-size: 12px; color: #7a8faa; text-align: center; margin-top: 16px; }
    .error-box { background: #ffebee; padding: 16px; border-radius: 16px; border-left: 5px solid #c62828; margin: 10px 0; color: #b71c1c; }
    .pill { display: inline-block; padding: 4px 12px; border-radius: 40px; color: white; font-size: 13px; font-weight: 600; }
    .small-note { font-size: 12px; color: #5d7fa5; margin-top: 4px; }
    .data-source-select { margin-bottom: 12px; }
  </style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <h1>🥗 NutriCheck</h1>
    <p id="welcome">Halo, selamat datang!</p>
  </div>

  <section id="account" class="section">
    <h2>👤 Akun</h2>
    <input type="text" id="username" placeholder="Nama (opsional)" value="" />
    <button id="saveUserBtn">Simpan Nama</button>
    <p class="small-note" style="margin-top:12px;">🔑 API Key Edamam sudah tertanam.</p>
  </section>

  <section id="food" class="section hidden">
    <h2>🔍 Cek Makanan</h2>
    <input type="text" id="searchFood" placeholder="Cari makanan cepat..." />
    <div id="foodListContainer"></div>
    
    <input type="text" id="foodInput" placeholder="Contoh: 100g burger atau 200g nasi" value="100g telur" />
    <p style="font-size:12px; color:#666;">Tulis dengan berat, misal "100g telur"</p>
    
    <!-- Pilihan sumber data -->
    <div class="data-source-select">
      <select id="dataSource">
        <option value="auto" selected>🔀 Otomatis (Edamam dulu, lalu OpenFood)</option>
        <option value="edamam">🌱 Edamam (makanan umum)</option>
        <option value="off">🏷️ Open Food Facts (produk bermerek)</option>
      </select>
    </div>

    <div class="row">
      <select id="ageGroup">
        <option value="child">Anak-anak (≤12 th)</option>
        <option value="adult" selected>Dewasa (13-50 th)</option>
        <option value="senior">Lansia (>50 th)</option>
      </select>
    </div>

    <button id="cekFoodBtn">📊 Analisis Nutrisi</button>
    <div id="result"></div>
    <div id="errorMessage" class="error-box hidden"></div>
    <div class="chart-wrapper">
      <div class="chart-container"><canvas id="radarChart"></canvas></div>
      <div class="chart-container"><canvas id="barChart"></canvas></div>
    </div>
  </section>

  <section id="riwayat" class="section hidden">
    <h2>📜 Riwayat</h2>
    <div id="historyList"></div>
    <button id="exportCsvBtn">📥 Export CSV</button>
  </section>

  <div class="navbar">
    <button data-section="account">👤 Akun</button>
    <button data-section="food">🔍 Cek</button>
    <button data-section="riwayat">📜 Riwayat</button>
  </div>
  <div class="footer-note">Data: Edamam · Open Food Facts · lokal</div>
</div>

<script>
  (function() {
    // ========== KUNCI API LANGSUNG DISINI ==========
    const APP_ID = "83a6c971";
    const APP_KEY = "f57d9ecae7775582f830d07bfeecfbf4";

    let currentUser = localStorage.getItem("user") || "";
    let radarChart, barChart;

    // Database fallback minimal
    const FALLBACK = {
      burger: { calories: 295, fat: 17, saturated_fat: 7, carbohydrates: 24, sugar: 6, fiber: 1, protein: 17, sodium: 500, cholesterol: 50 },
      pizza: { calories: 266, fat: 10, saturated_fat: 4, carbohydrates: 33, sugar: 4, fiber: 2, protein: 11, sodium: 600, cholesterol: 20 },
      fries: { calories: 312, fat: 15, saturated_fat: 2.3, carbohydrates: 41, sugar: 0.3, fiber: 3.8, protein: 3.4, sodium: 210, cholesterol: 0 },
      apple: { calories: 52, fat: 0.2, saturated_fat: 0, carbohydrates: 14, sugar: 10, fiber: 2.4, protein: 0.3, sodium: 1, cholesterol: 0 },
      banana: { calories: 89, fat: 0.3, saturated_fat: 0.1, carbohydrates: 23, sugar: 12, fiber: 2.6, protein: 1.1, sodium: 1, cholesterol: 0 },
      egg: { calories: 155, fat: 11, saturated_fat: 3.3, carbohydrates: 1.1, sugar: 1.1, fiber: 0, protein: 13, sodium: 124, cholesterol: 373 },
      rice: { calories: 130, fat: 0.3, saturated_fat: 0.1, carbohydrates: 28, sugar: 0.1, fiber: 0.4, protein: 2.7, sodium: 1, cholesterol: 0 },
      chicken: { calories: 239, fat: 14, saturated_fat: 3.8, carbohydrates: 0, sugar: 0, fiber: 0, protein: 27, sodium: 77, cholesterol: 88 },
      milk: { calories: 61, fat: 3.3, saturated_fat: 1.9, carbohydrates: 4.8, sugar: 5, fiber: 0, protein: 3.2, sodium: 40, cholesterol: 10 }
    };

    const foodSuggestions = Object.keys(FALLBACK);

    document.getElementById("username").value = currentUser;

    function showSection(id) {
      document.querySelectorAll(".section").forEach(sec => sec.classList.add("hidden"));
      document.getElementById(id)?.classList.remove("hidden");
      if (id === "riwayat") loadHistory();
      if (id === "food") renderSuggestions();
    }

    document.querySelectorAll(".navbar button").forEach(btn => {
      btn.addEventListener("click", () => showSection(btn.dataset.section));
    });

    document.getElementById("saveUserBtn").addEventListener("click", () => {
      const name = document.getElementById("username").value.trim();
      currentUser = name;
      if (currentUser) {
        localStorage.setItem("user", currentUser);
        document.getElementById("welcome").innerText = "Halo, " + currentUser + " 👋";
      } else {
        localStorage.removeItem("user");
        document.getElementById("welcome").innerText = "Halo, selamat datang!";
      }
    });

    function renderSuggestions(filter = "") {
      const container = document.getElementById("foodListContainer");
      container.innerHTML = "";
      const list = foodSuggestions.filter(f => f.toLowerCase().includes(filter.toLowerCase()));
      list.forEach(f => {
        const div = document.createElement("div");
        div.className = "food-card";
        div.innerText = f.charAt(0).toUpperCase() + f.slice(1);
        div.onclick = () => document.getElementById("foodInput").value = "100g " + f;
        container.appendChild(div);
      });
    }
    document.getElementById("searchFood").addEventListener("input", (e) => renderSuggestions(e.target.value));
    renderSuggestions();

    function parseInput(input) {
      input = input.trim();
      const match = input.match(/^(\d+)\s*(?:g|gram)?\s+(.+)$/i);
      if (match) {
        return { weight: parseFloat(match[1]), foodName: match[2].trim() };
      } else {
        return { weight: 100, foodName: input };
      }
    }

    // ========== EDAMAM (diperbaiki) ==========
    async function searchEdamam(query) {
      const url = `https://api.edamam.com/api/food-database/v2/parser?app_id=${APP_ID}&app_key=${APP_KEY}&ingr=${encodeURIComponent(query)}`;
      try {
        const res = await fetch(url, {
          headers: { 'User-Agent': 'NutriCheck/1.0 (https://nutricheck.app)' }
        });
        if (!res.ok) {
          console.warn(`Edamam HTTP error: ${res.status}`);
          return null;
        }
        const data = await res.json();
        console.log('Edamam response:', data); // untuk debugging

        if (data.hints && data.hints.length > 0) {
          const food = data.hints[0].food;
          if (!food || !food.nutrients) return null;

          const nutrients = food.nutrients;
          // Ambil nilai per 100g (sudah default dari Edamam)
          return {
            product_name: food.label || query,
            nutriments: {
              calories: nutrients.ENERC_KCAL || 0,
              fat: nutrients.FAT || 0,
              saturated_fat: 0, // Edamam tidak selalu menyediakan
              carbohydrates: nutrients.CHOCDF || 0,
              sugar: nutrients.SUGAR || 0,
              fiber: nutrients.FIBTG || 0,
              protein: nutrients.PROCNT || 0,
              // sodium biasanya dalam mg, tapi jika <10 asumsikan gram, konversi
              sodium: nutrients.NA ? (nutrients.NA < 10 ? nutrients.NA * 1000 : nutrients.NA) : 0,
              cholesterol: 0
            }
          };
        } else {
          console.warn('Edamam: no hints found');
        }
      } catch (e) {
        console.warn('Edamam exception:', e);
      }
      return null;
    }

    // ========== OPEN FOOD FACTS ==========
    async function searchOpenFoodFacts(query) {
      const url = `https://world.openfoodfacts.org/cgi/search.pl?search_terms=${encodeURIComponent(query)}&search_simple=1&action=process&json=1&page_size=5`;
      try {
        const res = await fetch(url, {
          headers: { 'User-Agent': 'NutriCheck/1.0' }
        });
        if (!res.ok) throw new Error(`OFF HTTP ${res.status}`);
        const data = await res.json();
        if (data.products && data.products.length > 0) {
          // Cari produk dengan nutrisi dan nama relevan
          for (let product of data.products) {
            const productName = (product.product_name || "").toLowerCase();
            if (product.nutriments && Object.keys(product.nutriments).length > 0) {
              if (productName.includes(query.toLowerCase()) || query.toLowerCase().includes(productName)) {
                return product;
              }
            }
          }
          // Ambil produk pertama yang punya nutrisi
          for (let product of data.products) {
            if (product.nutriments && Object.keys(product.nutriments).length > 0) {
              return product;
            }
          }
        }
      } catch (e) {
        console.warn("OFF error", e);
      }
      return null;
    }

    // ========== PENCARIAN UTAMA DENGAN PILIHAN SUMBER ==========
    async function searchFood(query, source) {
      const errorDiv = document.getElementById("errorMessage");
      errorDiv.classList.add("hidden");

      let product = null;

      if (source === 'edamam') {
        product = await searchEdamam(query);
      } else if (source === 'off') {
        product = await searchOpenFoodFacts(query);
      } else { // auto
        product = await searchEdamam(query);
        if (!product) {
          product = await searchOpenFoodFacts(query);
        }
      }

      if (product) {
        return product;
      }

      // Fallback lokal
      const lowerQuery = query.toLowerCase();
      for (let key in FALLBACK) {
        if (lowerQuery.includes(key)) {
          console.log("Fallback lokal untuk:", key);
          return { product_name: key, nutriments: FALLBACK[key] };
        }
      }

      errorDiv.classList.remove("hidden");
      errorDiv.innerHTML = `❌ Makanan "${query}" tidak ditemukan. Coba sumber lain atau saran di atas.`;
      throw new Error("Makanan tidak ditemukan");
    }

    function extractNutriments(product) {
      const n = product.nutriments || {};
      return {
        calories: n.calories || n.energy_value || n.energy_100g || n.energy || 0,
        fat: n.fat || n.fat_value || n.fat_100g || 0,
        saturated_fat: n.saturated_fat || n.saturated_fat_value || n.saturated_fat_100g || 0,
        carbohydrates: n.carbohydrates || n.carbohydrates_value || n.carbohydrates_100g || 0,
        sugar: n.sugar || n.sugars_value || n.sugars_100g || n.sugars || 0,
        fiber: n.fiber || n.fiber_value || n.fiber_100g || 0,
        protein: n.protein || n.proteins_value || n.proteins_100g || n.proteins || 0,
        sodium: n.sodium || n.sodium_value || n.sodium_100g || 0,
        cholesterol: n.cholesterol || n.cholesterol_value || n.cholesterol_100g || 0
      };
    }

    function getDailyLimits(ageGroup) {
      if (ageGroup === 'child') {
        return { cal:1500, fat:50, satFat:15, carbs:225, sugar:40, fiber:20, protein:45, sodium:1500, cholesterol:250 };
      } else if (ageGroup === 'senior') {
        return { cal:1800, fat:60, satFat:18, carbs:270, sugar:45, fiber:25, protein:55, sodium:1500, cholesterol:250 };
      } else {
        return { cal:2000, fat:65, satFat:20, carbs:300, sugar:50, fiber:25, protein:60, sodium:2000, cholesterol:300 };
      }
    }

    function calculateScores(nutriPer100g, weight, ageGroup) {
      const factor = weight / 100;
      const n = {
        cal: nutriPer100g.calories * factor,
        fat: nutriPer100g.fat * factor,
        satFat: nutriPer100g.saturated_fat * factor,
        carbs: nutriPer100g.carbohydrates * factor,
        sugar: nutriPer100g.sugar * factor,
        fiber: nutriPer100g.fiber * factor,
        protein: nutriPer100g.protein * factor,
        sodium: nutriPer100g.sodium * factor,
        cholesterol: nutriPer100g.cholesterol * factor
      };

      const limits = getDailyLimits(ageGroup);
      const pct = {
        cal: (n.cal / limits.cal) * 100,
        fat: (n.fat / limits.fat) * 100,
        satFat: (n.satFat / limits.satFat) * 100,
        carbs: (n.carbs / limits.carbs) * 100,
        sugar: (n.sugar / limits.sugar) * 100,
        fiber: (n.fiber / limits.fiber) * 100,
        protein: (n.protein / limits.protein) * 100,
        sodium: (n.sodium / limits.sodium) * 100,
        cholesterol: (n.cholesterol / limits.cholesterol) * 100
      };

      // GERD
      let gerdPenalty = 0;
      if (pct.fat > 20) gerdPenalty += (pct.fat - 20) * 1.5;
      if (pct.satFat > 15) gerdPenalty += (pct.satFat - 15) * 2;
      if (pct.cal > 25) gerdPenalty += (pct.cal - 25) * 1;
      let gerdBonus = 0;
      if (pct.fiber > 10) gerdBonus = Math.min(10, (pct.fiber - 10) * 0.5);
      let gerdScore = 100 - gerdPenalty + gerdBonus;
      gerdScore = Math.min(100, Math.max(0, Math.round(gerdScore)));

      // JANTUNG
      let heartPenalty = 0;
      if (pct.satFat > 15) heartPenalty += (pct.satFat - 15) * 2;
      if (pct.sodium > 20) heartPenalty += (pct.sodium - 20) * 1.5;
      if (pct.cholesterol > 20) heartPenalty += (pct.cholesterol - 20) * 1;
      let heartBonus = 0;
      if (pct.fiber > 10) heartBonus = Math.min(10, (pct.fiber - 10) * 0.5);
      let heartScore = 100 - heartPenalty + heartBonus;
      heartScore = Math.min(100, Math.max(0, Math.round(heartScore)));

      // PENCERNAAN
      let digestionPenalty = 0;
      if (pct.sugar > 20) digestionPenalty += (pct.sugar - 20) * 1;
      if (pct.fiber < 10) digestionPenalty += (10 - pct.fiber) * 2;
      const complex = n.carbs - n.fiber - n.sugar;
      if (complex < 5) digestionPenalty += (5 - complex) * 1;
      let digestionScore = 100 - digestionPenalty;
      digestionScore = Math.min(100, Math.max(0, Math.round(digestionScore)));

      const calLimit = limits.cal;
      let ageRec = '';
      if (n.cal > calLimit * 0.3) {
        ageRec = `⚠️ Porsi ini ${n.cal.toFixed(0)} kkal (${(n.cal/calLimit*100).toFixed(0)}% AKG). Perhatikan total harian.`;
      } else {
        ageRec = `✅ Porsi sesuai (${n.cal.toFixed(0)} kkal, ${(n.cal/calLimit*100).toFixed(0)}% AKG).`;
      }

      return {
        gerd: gerdScore,
        heart: heartScore,
        digestion: digestionScore,
        ageRec,
        nutrients: n
      };
    }

    function displayResult(scores, productName, weight, ageGroup) {
      const resultDiv = document.getElementById("result");
      const n = scores.nutrients;

      let gerdClass = scores.gerd >= 70 ? "good" : scores.gerd >= 40 ? "warning" : "bad";
      let heartClass = scores.heart >= 70 ? "good" : scores.heart >= 40 ? "warning" : "bad";
      let digeClass = scores.digestion >= 70 ? "good" : scores.digestion >= 40 ? "warning" : "bad";

      resultDiv.innerHTML = `
        <div class="card">
          <div style="font-weight:600; margin-bottom:10px;">${productName} (${weight}g)</div>
          <div class="metrics-grid">
            <div class="metric-card"><div class="metric-title">GERD</div><div class="score" style="color:${scores.gerd>=70?'#1e8e3e':scores.gerd>=40?'#f9a825':'#c53929'}">${scores.gerd}</div></div>
            <div class="metric-card"><div class="metric-title">Jantung</div><div class="score" style="color:${scores.heart>=70?'#1e8e3e':scores.heart>=40?'#f9a825':'#c53929'}">${scores.heart}</div></div>
            <div class="metric-card"><div class="metric-title">Pencernaan</div><div class="score" style="color:${scores.digestion>=70?'#1e8e3e':scores.digestion>=40?'#f9a825':'#c53929'}">${scores.digestion}</div></div>
          </div>
          <div class="progress-bar-bg"><div class="progress-fill ${gerdClass}" style="width:${scores.gerd}%">GERD ${scores.gerd}</div></div>
          <div class="progress-bar-bg"><div class="progress-fill ${heartClass}" style="width:${scores.heart}%">Jantung ${scores.heart}</div></div>
          <div class="progress-bar-bg"><div class="progress-fill ${digeClass}" style="width:${scores.digestion}%">Pencernaan ${scores.digestion}</div></div>
          <div class="recommend-box">
            <strong>💡 Rekomendasi usia:</strong> ${scores.ageRec}<br>
            <strong>🥩 Protein:</strong> ${n.protein.toFixed(1)}g | <strong>🧈 Lemak:</strong> ${n.fat.toFixed(1)}g<br>
            <strong>🍚 Karbo:</strong> ${n.carbs.toFixed(1)}g | <strong>🌾 Serat:</strong> ${n.fiber.toFixed(1)}g<br>
            <strong>🧂 Sodium:</strong> ${n.sodium.toFixed(1)}mg | <strong>🍬 Gula:</strong> ${n.sugar.toFixed(1)}g
          </div>
        </div>
      `;

      if (radarChart) radarChart.destroy();
      radarChart = new Chart(document.getElementById("radarChart"), {
        type: "radar",
        data: {
          labels: ["Kalori", "Lemak", "Gula", "Serat", "Protein", "Sodium"],
          datasets: [{
            label: "% AKG (dewasa)",
            data: [
              Math.min(100, (n.cal / 2000) * 100),
              Math.min(100, (n.fat / 65) * 100),
              Math.min(100, (n.sugar / 50) * 100),
              Math.min(100, (n.fiber / 25) * 100),
              Math.min(100, (n.protein / 60) * 100),
              Math.min(100, (n.sodium / 2000) * 100)
            ],
            backgroundColor: "rgba(30,58,95,0.2)",
            borderColor: "#1e3a5f"
          }]
        },
        options: { responsive: true, maintainAspectRatio: true, scales: { r: { min: 0, max: 100 } } }
      });

      if (barChart) barChart.destroy();
      barChart = new Chart(document.getElementById("barChart"), {
        type: "bar",
        data: {
          labels: ["Kalori", "Lemak", "Protein", "Karbo", "Serat", "Gula"],
          datasets: [{
            data: [n.cal, n.fat, n.protein, n.carbs, n.fiber, n.sugar],
            backgroundColor: ["#1e3a5f", "#f9a825", "#2e7d32", "#7b1fa2", "#0d47a1", "#c53929"]
          }]
        },
        options: { responsive: true, plugins: { legend: { display: false } } }
      });
    }

    document.getElementById("cekFoodBtn").addEventListener("click", async () => {
      const input = document.getElementById("foodInput").value.trim();
      const ageGroup = document.getElementById("ageGroup").value;
      const source = document.getElementById("dataSource").value; // ambil pilihan
      const errorDiv = document.getElementById("errorMessage");

      if (!input) {
        errorDiv.classList.remove("hidden");
        errorDiv.innerHTML = "❌ Masukkan nama makanan.";
        return;
      }

      const { weight, foodName } = parseInput(input);
      if (weight <= 0) {
        errorDiv.classList.remove("hidden");
        errorDiv.innerHTML = "❌ Berat harus positif.";
        return;
      }

      document.getElementById("result").innerHTML = "";
      errorDiv.classList.add("hidden");

      try {
        const product = await searchFood(foodName, source);
        const nutriments = extractNutriments(product);
        const scores = calculateScores(nutriments, weight, ageGroup);
        displayResult(scores, product.product_name || foodName, weight, ageGroup);

        if (currentUser) {
          const history = JSON.parse(localStorage.getItem("history")) || {};
          if (!history[currentUser]) history[currentUser] = [];
          history[currentUser].push({
            food: foodName,
            weight: weight,
            gerd: scores.gerd,
            heart: scores.heart,
            digestion: scores.digestion,
            time: new Date().toLocaleString("id-ID")
          });
          localStorage.setItem("history", JSON.stringify(history));
        }
      } catch (error) {
        console.error(error);
      }
    });

    function loadHistory() {
      const listDiv = document.getElementById("historyList");
      listDiv.innerHTML = "";
      if (!currentUser) { listDiv.innerHTML = "<p class='card'>🔒 Login untuk lihat riwayat.</p>"; return; }
      const history = JSON.parse(localStorage.getItem("history"))?.[currentUser] || [];
      if (!history.length) { listDiv.innerHTML = "<p class='card'>📭 Belum ada riwayat.</p>"; return; }
      history.slice().reverse().forEach(item => {
        const div = document.createElement("div");
        div.className = "card";
        div.innerHTML = `
          <div>${item.time}</div>
          <div><strong>${item.food} (${item.weight}g)</strong></div>
          <div style="display:flex; gap:6px; margin-top:6px;">
            <span class="pill" style="background:${item.gerd>=70?'#1e8e3e':item.gerd>=40?'#f9a825':'#c53929'}">G:${item.gerd}</span>
            <span class="pill" style="background:${item.heart>=70?'#1e8e3e':item.heart>=40?'#f9a825':'#c53929'}">J:${item.heart}</span>
            <span class="pill" style="background:${item.digestion>=70?'#1e8e3e':item.digestion>=40?'#f9a825':'#c53929'}">P:${item.digestion}</span>
          </div>
        `;
        listDiv.appendChild(div);
      });
    }

    document.getElementById("exportCsvBtn").addEventListener("click", () => {
      if (!currentUser) return alert("Login dulu.");
      const history = JSON.parse(localStorage.getItem("history"))?.[currentUser] || [];
      if (!history.length) return alert("Tidak ada data.");
      let csv = "Waktu,Makanan,Berat (g),GERD,Jantung,Pencernaan\n";
      history.forEach(i => csv += `"${i.time}","${i.food}",${i.weight},${i.gerd},${i.heart},${i.digestion}\n`);
      const blob = new Blob([csv], { type: "text/csv" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = `riwayat_${currentUser}.csv`;
      a.click();
      URL.revokeObjectURL(url);
    });

    if (currentUser) document.getElementById("welcome").innerText = "Halo kembali, " + currentUser + " 👋";
  })();
</script>
</body>
</html>
