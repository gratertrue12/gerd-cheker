<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GERD Checker App</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@3.9.1/dist/chart.min.js"></script>
  <script src="https://unpkg.com/ml5@0.12.2/dist/ml5.min.js"></script>
</head>
<body>
  <div class="app">
    <div class="topbar">
      <h1>GERD Checker</h1>
      <p id="welcome">Halo, silakan masukkan nama akun</p>
    </div>

    <section id="account" class="section">
      <h2>Akun</h2>
      <input type="text" id="username" placeholder="Masukkan nama akun">
      <button onclick="saveUser()">Simpan Akun</button>
    </section>

    <section id="food" class="section hidden">
      <h2>Pencarian Makanan</h2>
      <input type="text" id="searchFood" oninput="searchFood()" placeholder="Cari makanan...">
      <div id="foodListContainer"></div>
      <input type="text" id="foodInput" placeholder="Masukkan makanan (contoh: 100 g apple)">
      <button onclick="cekFood()">Cek Makanan</button>
      <div id="result"></div>
      <canvas id="nutritionChart"></canvas>
      <button onclick="openCamera()">Buka Kamera</button>
      <video id="camera" class="hidden" autoplay playsinline></video>
      <button onclick="takePhoto()">Ambil Foto</button>
      <img id="capturedImage" class="hidden">
    </section>

    <section id="bmi" class="section hidden">
      <h2>Kalkulator BMI</h2>
      <input type="number" id="weight" placeholder="Berat (kg)">
      <input type="number" id="height" placeholder="Tinggi (cm)">
      <button onclick="hitungBMI()">Hitung BMI</button>
      <div id="bmiResult"></div>
    </section>

    <section id="riwayat" class="section hidden">
      <h2>Riwayat Penggunaan</h2>
      <div id="historyList"></div>
    </section>

    <div class="navbar">
      <button onclick="showSection('account')">Akun</button>
      <button onclick="showSection('food')">Makanan</button>
      <button onclick="showSection('bmi')">BMI</button>
      <button onclick="showSection('riwayat')">Riwayat</button>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
