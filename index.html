<!DOCTYPE html>
<html lang="id">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GERD Food Checker</title>

<link rel="stylesheet" href="style.css">

<style>

body{
font-family:Arial;
background:#f4f6f8;
margin:0;
padding:0;
display:flex;
justify-content:center;
}

.app{

max-width:420px;
width:100%;
background:white;
min-height:100vh;
padding:20px;
box-sizing:border-box;

}

h1{
text-align:center;
margin-bottom:20px;
}

button{

width:100%;
padding:15px;
border:none;
background:#2ecc71;
color:white;
font-size:16px;
border-radius:10px;
margin-top:10px;
cursor:pointer;

}

video{

width:100%;
border-radius:12px;
margin-top:15px;

}

.result{

margin-top:20px;
padding:15px;
background:#f1f1f1;
border-radius:10px;

}

</style>

</head>

<body>

<div class="app">

<h1>GERD Food Checker</h1>

<button onclick="startCamera()">Scan Makanan</button>

<video id="video" autoplay playsinline></video>

<div class="result" id="result">

Hasil scan akan muncul di sini

</div>

</div>

<script src="script.js"></script>

</body>

</html>
