<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GERD Checker App</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <div class="topbar">
      <h1>GERD Checker</h1>
      <p id="welcome">Halo, selamat datang!</p>
    </div>

    <section id="account" class="section">
      <h2>Akun (Opsional)</h2>
      <input type="text" id="username" placeholder="Masukkan nama akun (opsional)">
      <button id="saveUserBtn">Simpan Akun</button>
    </section>

    <section id="food" class="section hidden">
      <h2>Cek Makanan</h2>
      <input type="text" id="searchFood" placeholder="Cari makanan..." />
      <div id="foodListContainer"></div>
      <input type="text" id="foodInput" placeholder="Masukkan makanan contoh: 100 g apel">
      <button id="cekFoodBtn">Cek Makanan</button>
      <div id="result"></div>
      <canvas id="nutritionChart"></canvas>
      <button id="openCameraBtn">Buka Kamera</button>
      <video id="camera" class="hidden" autoplay playsinline></video>
      <button id="takePhotoBtn">Ambil Foto</button>
      <img id="capturedImage" class="hidden" />
    </section>

    <section id="bmi" class="section hidden">
      <h2>Kalkulator BMI</h2>
      <input type="number" id="weight" placeholder="Berat (kg)">
      <input type="number" id="height" placeholder="Tinggi (cm)">
      <button id="bmiBtn">Hitung BMI</button>
      <div id="bmiResult"></div>
    </section>

    <section id="riwayat" class="section hidden">
      <h2>Riwayat Penggunaan</h2>
      <div id="historyList"></div>
    </section>

    <div class="navbar">
      <button data-section="account">Akun</button>
      <button data-section="food">Makanan</button>
      <button data-section="bmi">BMI</button>
      <button data-section="riwayat">Riwayat</button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@3.9.1/dist/chart.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
