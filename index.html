<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GERD Checker</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1 id="welcome">Halo!</h1>

  <!-- Menu -->
  <nav>
    <button onclick="showSection('checker')">Checker</button>
    <button onclick="showSection('riwayat')">Riwayat</button>
  </nav>

  <!-- Sections -->
  <div id="checker" class="section">
    <input type="text" id="foodInput" placeholder="Masukkan makanan, contoh: 100 g apple">
    <button onclick="cekFood()">Cek GERD</button>
    <div id="result"></div>
    <canvas id="nutritionChart"></canvas>
    <video id="camera" class="hidden" width="320" height="240" autoplay></video>
    <img id="capturedImage" class="hidden" alt="Captured Image">
    <button onclick="openCamera()">Buka Kamera</button>
    <button onclick="takePhoto()">Ambil Foto</button>
  </div>

  <div id="riwayat" class="section hidden">
    <div id="historyList"></div>
  </div>

  <!-- User Account -->
  <div>
    <input type="text" id="username" placeholder="Nama akun">
    <button onclick="saveUser()">Simpan Akun</button>
  </div>

  <!-- BMI -->
  <div>
    <input type="number" id="weight" placeholder="Berat (kg)">
    <input type="number" id="height" placeholder="Tinggi (cm)">
    <button onclick="hitungBMI()">Hitung BMI</button>
    <div id="bmiResult"></div>
  </div>

  <!-- Scripts -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/ml5/0.12.2/ml5.min.js"></script>
  <script src="https://gratertrue12.github.io/gerd-cheker/script.js"></script>
</body>
</html>
